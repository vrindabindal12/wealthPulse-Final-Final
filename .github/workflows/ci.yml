name: WealthPulse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql+asyncpg://postgres:password@localhost:5432/wealthpulse' }}
      REDIS_URL: ${{ secrets.REDIS_URL || 'redis://localhost:6379/0' }}
      CLERK_API_URL: ${{ secrets.CLERK_API_URL || 'https://dummy-clerk.accounts.dev' }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'dummy_groq_key' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'dummy_gemini_key' }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY || 'dummy_finnhub_key' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        run: |
          pytest tests/ -v
